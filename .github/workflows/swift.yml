name: Swift
on: [push]
jobs:

  macos:
    name: macOS
    runs-on: macos-26
    strategy:
      matrix:
        config: ["debug"]
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    # Xcode's bundled Swift 6.3.2 and the swift.org swift-6.3.2-RELEASE
    # toolchain are different builds despite the matching version number,
    # and have diverged on at least one typed-throws/existential edge case
    # that Silica's CGContext initializer hits. Installing the swift.org
    # release via swiftly keeps this in sync with local development and
    # with the Android port's toolchain.
    - name: Install Swift 6.3.2 via swiftly
      run: |
        set -eux
        curl -fsSL -O https://download.swift.org/swiftly/darwin/swiftly.pkg
        installer -pkg swiftly.pkg -target CurrentUserHomeDirectory
        "$HOME/.swiftly/bin/swiftly" init --quiet-shell-followup --assume-yes
        echo "$HOME/.swiftly/bin" >> "$GITHUB_PATH"
        "$HOME/.swiftly/bin/swiftly" install 6.3.2
        "$HOME/.swiftly/bin/swiftly" use 6.3.2
    - name: Swift Version
      run: swift --version
    - name: Install system libraries
      run: brew install sdl3 cairo fontconfig
    - name: Build
      run: swift build -c ${{ matrix.config }}
    # --no-parallel: Cairo/FontConfig font construction and teardown share
    # global state that isn't thread-safe across concurrently running
    # renderer-creating suites.
    - name: Test
      run: swift test -c ${{ matrix.config }} --no-parallel
    - name: Run demo (headless)
      run: SDL_VIDEO_DRIVER=dummy CLASSICUI_FRAME_LIMIT=30 swift run -c ${{ matrix.config }} ClassicUIDemo
    - name: Build macOS app (SpriteKit, ports/Darwin)
      run: |
        xcodebuild -project ports/Darwin/ClassicUIDarwin.xcodeproj \
          -scheme ClassicUIDarwin -configuration Debug \
          -derivedDataPath /tmp/dd CODE_SIGNING_ALLOWED=NO build

  linux:
    name: Linux (${{ matrix.container }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        container: ["swift:latest"]
        config: ["debug"]
    container: ${{ matrix.container }}
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Swift Version
      run: swift --version
    - name: Install system libraries
      run: |
        apt-get update
        apt-get install -y --no-install-recommends \
          libcairo2-dev libfontconfig-dev libfreetype-dev fonts-dejavu-core \
          pkg-config cmake ninja-build build-essential git ca-certificates
    # SDL3 isn't packaged in this Ubuntu yet; build it from source (the
    # dummy video driver needs no display libraries).
    - name: Build SDL3 from source
      run: |
        git clone --depth 1 --branch release-3.4.12 https://github.com/libsdl-org/SDL.git /tmp/SDL
        # X11/Wayland off: the container has partial X headers (via cairo's
        # dependencies) that trip SDL's configure, and CI only needs the
        # dummy video driver anyway.
        cmake -S /tmp/SDL -B /tmp/sdl-build -G Ninja -DCMAKE_BUILD_TYPE=Release \
          -DSDL_X11=OFF -DSDL_WAYLAND=OFF -DSDL_UNIX_CONSOLE_BUILD=ON
        cmake --build /tmp/sdl-build
        cmake --install /tmp/sdl-build --prefix /usr/local
        ldconfig
    - name: Build
      run: swift build -c ${{ matrix.config }}
    - name: Test
      run: swift test -c ${{ matrix.config }} --no-parallel
    - name: Run demo (headless)
      run: SDL_VIDEO_DRIVER=dummy CLASSICUI_FRAME_LIMIT=30 swift run -c ${{ matrix.config }} ClassicUIDemo
