name: Android
on: [push]
jobs:

  android:
    name: Android (build + upload APK)
    runs-on: macos-26
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Swift 6.3.2 via swiftly
        # The Android SDK artifact bundle is pinned to a specific Swift release (module format
        # isn't cross-patch-compatible), so install that exact toolchain via swiftly rather
        # than relying on Xcode's bundled compiler.
        run: |
          set -eux
          curl -fsSL -O https://download.swift.org/swiftly/darwin/swiftly.pkg
          installer -pkg swiftly.pkg -target CurrentUserHomeDirectory
          "$HOME/.swiftly/bin/swiftly" init --quiet-shell-followup --assume-yes
          echo "SWIFTLY_HOME_DIR=$HOME/.swiftly" >> "$GITHUB_ENV"
          echo "SWIFTLY_BIN_DIR=$HOME/.swiftly/bin" >> "$GITHUB_ENV"
          echo "$HOME/.swiftly/bin" >> "$GITHUB_PATH"
          "$HOME/.swiftly/bin/swiftly" install 6.3.2
          "$HOME/.swiftly/bin/swiftly" use 6.3.2
      - name: Swift Version
        run: swift --version
      - name: Install Swift Android SDK
        run: |
          set -eux
          url="https://download.swift.org/swift-6.3.2-release/android-sdk/swift-6.3.2-RELEASE/swift-6.3.2-RELEASE_android.artifactbundle.tar.gz"
          curl -fsSL "$url" -o android.artifactbundle.tar.gz
          swift sdk install android.artifactbundle.tar.gz
          swift sdk list
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Install font-generation dependencies
        run: pip3 install --break-system-packages Pillow
      - name: Set up Android SDK components (NDK, platform, build-tools)
        run: |
          set -eux
          android_home="$HOME/Library/Android/sdk"
          echo "ANDROID_HOME=$android_home" >> "$GITHUB_ENV"
          mkdir -p "$android_home/cmdline-tools"
          curl -fsSL "https://dl.google.com/android/repository/commandlinetools-mac-14742923_latest.zip" -o cmdline-tools.zip
          unzip -q cmdline-tools.zip -d "$android_home/cmdline-tools"
          mv "$android_home/cmdline-tools/cmdline-tools" "$android_home/cmdline-tools/latest"
          echo "$android_home/cmdline-tools/latest/bin" >> "$GITHUB_PATH"
          echo "$android_home/platform-tools" >> "$GITHUB_PATH"
          export PATH="$android_home/cmdline-tools/latest/bin:$PATH"
          yes | sdkmanager --licenses > /dev/null || true
          sdkmanager "platforms;android-36" "build-tools;36.0.0" "ndk;27.2.12479018" "platform-tools"
      - name: Vendor SDL3 Android prebuilt
        run: ports/Android/scripts/fetch-sdl.sh
      - name: Ensure Gradle is available
        run: command -v gradle || brew install gradle
      - name: Build debug APK
        run: make -C ports/Android apk
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: classicui-android-debug
          path: ports/Android/AndroidApp/app/build/outputs/apk/debug/app-debug.apk
